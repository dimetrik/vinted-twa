<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f5f5f5; color: #333; }
        h3 { text-align: center; margin-bottom: 20px; color: #0088cc; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        select, input, button { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
            font-size: 16px; 
            background-color: white;
        }
        .price-row { display: flex; gap: 10px; }
        .price-row input { width: 50%; }
        button { 
            background-color: #0088cc; 
            color: white; 
            border: none; 
            font-weight: bold; 
            margin-top: 20px; 
            cursor: pointer;
        }
        button:active { background-color: #006699; }
    </style>
</head>
<body>
    <h3>🎯 Vinted Sniper Pro Filters (Фильтры снайпера Pro)</h3>
    
    <div class="form-group">
        <label>Category (Категория):</label>
        <select id="catalog_id">
            <option value="">All items (Всё подряд)</option>
            <optgroup label="Men (Мужское)">
                <option value="5">All Men's Clothing (Вся мужская одежда)</option>
                <option value="2058">Jackets & Coats (Куртки и Пальто)</option>
                <option value="2053">Hoodies & Sweatshirts (Худи и Свитшоты)</option>
                <option value="2052">T-shirts & Polos (Футболки и Поло)</option>
                <option value="2054">Pants & Jeans (Штаны и Джинсы)</option>
                <option value="1242">All Men's Shoes (Вся мужская обувь)</option>
                <option value="1244">Sneakers (Кроссовки)</option>
            </optgroup>
            <optgroup label="Women (Женское)">
                <option value="4">All Women's Clothing (Вся женская одежда)</option>
                <option value="1908">Jackets & Coats (Куктки и Пальто)</option>
                <option value="1903">Hoodies & Sweatshirts (Худи и Свитшоты)</option>
                <option value="1904">T-shirts & Tops (Футболки и Топы)</option>
                <option value="1905">Pants & Jeans (Штаны и Джинсы)</option>
                <option value="16">All Women's Shoes (Вся женская обувь)</option>
                <option value="1206">Sneakers (Кроссовки)</option>
            </optgroup>
        </select>
    </div>

    <div class="form-group">
        <label>Brand (Бренд):</label>
<select id="brand_id">
    <option value="">All Brands (Любой бренд)</option>
    <option value="53">Nike</option>
    <option value="362">Adidas</option>
    <option value="7186">Stone Island</option>
    <option value="251">Carhartt</option>
    <option value="304">The North Face</option>
    <option value="649">Arc'teryx</option>
    <option value="88">Ralph Lauren</option>
    <option value="214">Levi's</option>
    <option value="1288">Puma</option>
    <option value="267">Tommy Hilfiger</option>
    <option value="424">Lacoste</option>
    <option value="346">New Balance</option>
    <option value="405">Calvin Klein</option>
    <option value="1178">Champion</option>
    <option value="500">Dickies</option>
    <option value="1268">Vans</option>
    <option value="573">Timberland</option>
    <option value="1328">Reebok</option>
    <option value="482">Hugo Boss</option>
    <option value="249">Diesel</option>
    <option value="154">Dr. Martens</option>
    <option value="794">Stussy</option>
    <option value="273">Supreme</option>
    <option value="963">Patagonia</option>
    <option value="427">Under Armour</option>
    <option value="1418">ASICS</option>
    <option value="260">Fila</option>
    <option value="1538">Columbia</option>
    <option value="1542">Quiksilver</option>
    <option value="1624">North Sails</option>
</select>
    </div>

    <div class="form-group">
        <label>Price Range / Цена (€):</label>
        <div class="price-row">
            <input type="number" id="price_min" placeholder="Min (От)">
            <input type="number" id="price_max" placeholder="Max (До)">
        </div>
    </div>

    <div class="form-group">
        <label>Clothing Size (Размер одежды):</label>
        <select id="size_clothing">
            <option value="">Any Size (Любой размер)</option>
            <option value="207">XS</option>
            <option value="208">S</option>
            <option value="209">M</option>
            <option value="210">L</option>
            <option value="211">XL</option>
        </select>
    </div>

    <div class="form-group">
        <label>Shoes Size (Размер обуви EU):</label>
        <select id="size_shoes">
            <option value="">Any Size (Любой размер)</option>
            <option value="779">40</option>
            <option value="780">41</option>
            <option value="781">42</option>
            <option value="782">43</option>
            <option value="783">44</option>
            <option value="784">45</option>
        </select>
    </div>

    <div class="form-group">
        <label>Condition (Состояние вещи):</label>
        <select id="condition_id">
            <option value="">Any Condition (Любое состояние)</option>
            <option value="6">New with tags (Новое с бирками)</option>
            <option value="1">New without tags (Новое без бирок)</option>
            <option value="2">Very good (Очень хорошее)</option>
        </select>
    </div>

    <button onclick="sendFilters()">Apply & Start Sniper (Применить и запустить)</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendFilters() {
            const data = {
                catalog_id: document.getElementById('catalog_id').value,
                brand_id: document.getElementById('brand_id').value,
                price_min: document.getElementById('price_min').value,
                price_max: document.getElementById('price_max').value,
                size_clothing: document.getElementById('size_clothing').value,
                size_shoes: document.getElementById('size_shoes').value,
                condition_id: document.getElementById('condition_id').value
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
